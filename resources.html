<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Resources — Timeaayi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
  body { background: var(--gray); min-height: 100vh; }

  .page-header-row {
    max-width: 1000px;
    margin: 0 auto;
    padding: 16px 24px 0;
    display: flex;
    justify-content: flex-end;
  }

  .change-link {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--black);
    text-decoration: none;
    border-bottom: 2px solid var(--blue);
  }
  .change-link:hover { color: var(--blue); }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    max-width: 1000px;
    margin: 16px auto 0;
    padding: 0 24px;
  }

  .crumb { background: var(--yellow); border: 2px solid var(--black); padding: 5px 10px; font-weight: 700; }
  .crumb.sem { background: var(--black); color: var(--yellow); }

  main { max-width: 1000px; margin: 0 auto; padding: 24px 24px 80px; }

  h1 { font-size: clamp(26px, 4vw, 36px); margin-bottom: 6px; }
  .subhead { font-size: 15px; margin-bottom: 28px; opacity: 0.8; }

  .tabs { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }

  .tab {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: var(--white);
    border: var(--border);
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-md); }
  .tab .count { background: var(--black); color: var(--white); font-size: 11px; padding: 1px 6px; }

  .tab.active[data-tab="classes"] { background: var(--blue); color: var(--white); }
  .tab.active[data-tab="notes"] { background: var(--yellow); }
  .tab.active[data-tab="papers"] { background: var(--orange); color: var(--white); }
  .tab.active .count { background: var(--white); color: var(--black); }

  .panel { display: none; }
  .panel.active { display: block; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }

  .card {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow-md);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .card:hover { transform: translate(-3px, -3px); box-shadow: var(--shadow-lg); }

  .card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    align-self: flex-start;
    padding: 3px 8px;
    border: 2px solid var(--black);
  }
  .panel[data-panel="classes"] .card-tag { background: var(--blue); color: var(--white); }
  .panel[data-panel="notes"] .card-tag { background: var(--yellow); }
  .panel[data-panel="papers"] .card-tag { background: var(--orange); color: var(--white); }

  .card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; line-height: 1.3; }
  .card .meta { font-family: 'Space Mono', monospace; font-size: 12px; opacity: 0.75; }
  .card .actions { margin-top: auto; padding-top: 8px; }

  .card .btn { font-size: 13px; padding: 7px 14px; box-shadow: 3px 3px 0px var(--black); }
  .card .btn:hover { box-shadow: 5px 5px 0px var(--black); }

  .empty {
    border: 3px dashed var(--black);
    padding: 40px 24px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    opacity: 0.75;
  }

  @media (max-width: 600px) {
    .page-header-row { justify-content: flex-start; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" id="siteNav">
      <a href="index.html" class="site-logo brand">time<span>aayi</span></a>
      <ul class="nav-links">
        <li><a href="select-course.html">Change course</a></li>
      </ul>
      <div class="auth-buttons" id="authButtons">
        <a href="signin.html" class="btn">Sign In</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
    </nav>
  </header>

  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="page-header-row">
    <a href="select-course.html" class="change-link">Change ↺</a>
  </div>

  <main>
    <h1 id="pageTitle">Your resources</h1>
    <p class="subhead" id="pageSub">Everything for this semester, in one place.</p>

    <div class="tabs">
      <button class="tab active" data-tab="classes">Classes <span class="count" id="countClasses">0</span></button>
      <button class="tab" data-tab="notes">Notes <span class="count" id="countNotes">0</span></button>
      <button class="tab" data-tab="papers">Question Papers <span class="count" id="countPapers">0</span></button>
    </div>

    <section class="panel active" data-panel="classes">
      <div class="grid" id="gridClasses"></div>
    </section>

    <section class="panel" data-panel="notes">
      <div class="grid" id="gridNotes"></div>
    </section>

    <section class="panel" data-panel="papers">
      <div class="grid" id="gridPapers"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>Timeaayi © 2026</span>
      <span>Built for students, by students</span>
    </div>
  </footer>

<script src="assets/js/app.js"></script>
<script>
  // ---- Read selection from URL ----
  const params = new URLSearchParams(window.location.search);
  const universityLabel = params.get('universityLabel') || 'Your University';
  const courseLabel = params.get('courseLabel') || 'Your Course';
  const semester = params.get('semester') || '1';

  document.getElementById('breadcrumb').innerHTML = `
    <span class="crumb">${universityLabel}</span>
    <span class="crumb">${courseLabel}</span>
    <span class="crumb sem">Sem ${semester}</span>
  `;
  document.getElementById('pageSub').textContent =
    `${courseLabel} · Semester ${semester} · ${universityLabel}`;

  // ---- Mock resource data ----
  // Placeholder content, not yet filtered by a real backend against the
  // selected university/course/semester. Swap these three arrays for an
  // API call keyed on (university, course, semester) later.
  const SUBJECTS = ['Data Structures', 'Digital Logic', 'Discrete Mathematics', 'Operating Systems'];

  const classes = [
    { subject: SUBJECTS[0], title: 'Arrays & Linked Lists — Full Lecture', meta: '48 min · Recorded 12 Jun' },
    { subject: SUBJECTS[1], title: 'Boolean Algebra Basics', meta: '35 min · Recorded 10 Jun' },
    { subject: SUBJECTS[2], title: 'Graph Theory Intro', meta: '52 min · Recorded 8 Jun' },
    { subject: SUBJECTS[3], title: 'Process Scheduling Explained', meta: '41 min · Recorded 5 Jun' },
  ];

  const notes = [
    { subject: SUBJECTS[0], title: 'Unit 1 — Arrays, Stacks & Queues', meta: '18 pages · PDF' },
    { subject: SUBJECTS[0], title: 'Unit 2 — Trees & Graphs', meta: '24 pages · PDF' },
    { subject: SUBJECTS[1], title: 'Unit 1 — Number Systems', meta: '12 pages · PDF' },
    { subject: SUBJECTS[2], title: 'Unit 3 — Combinatorics', meta: '20 pages · PDF' },
    { subject: SUBJECTS[3], title: 'Unit 1 — Process Management', meta: '16 pages · PDF' },
  ];

  const papers = [
    { subject: SUBJECTS[0], title: 'End Semester Exam 2025', meta: 'Regular · 3 hrs' },
    { subject: SUBJECTS[1], title: 'Mid Semester Exam 2025', meta: 'Regular · 1.5 hrs' },
    { subject: SUBJECTS[2], title: 'End Semester Exam 2024', meta: 'Supplementary · 3 hrs' },
    { subject: SUBJECTS[3], title: 'End Semester Exam 2025', meta: 'Regular · 3 hrs' },
  ];

  function renderGrid(gridId, items, tag) {
    const grid = document.getElementById(gridId);
    if (!items.length) {
      grid.innerHTML = `<div class="empty">Nothing uploaded here yet. Check back soon, or be the first to add one.</div>`;
      return;
    }
    grid.innerHTML = items.map(item => `
      <div class="card">
        <span class="card-tag">${item.subject}</span>
        <h3>${item.title}</h3>
        <span class="meta">${item.meta}</span>
        <div class="actions">
          <a href="#" class="btn">${tag}</a>
        </div>
      </div>
    `).join('');
  }

  renderGrid('gridClasses', classes, 'Watch');
  renderGrid('gridNotes', notes, 'Download');
  renderGrid('gridPapers', papers, 'Download');

  document.getElementById('countClasses').textContent = classes.length;
  document.getElementById('countNotes').textContent = notes.length;
  document.getElementById('countPapers').textContent = papers.length;

  // ---- Tabs ----
  const tabs = document.querySelectorAll('.tab');
  const panels = document.querySelectorAll('.panel');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.querySelector(`.panel[data-panel="${tab.dataset.tab}"]`).classList.add('active');
    });
  });

  // ---- Shared header behavior ----
  const menuToggle = document.getElementById('menuToggle');
  const nav = document.getElementById('siteNav');
  menuToggle.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    menuToggle.setAttribute('aria-expanded', isOpen);
    menuToggle.textContent = isOpen ? '✕' : '☰';
  });
  TimeaayiAuth.renderAuthButtons('authButtons');

  // Note: resources are viewable without an account in this version.
  // To require sign-in before browsing, uncomment the line below:
  // TimeaayiAuth.requireLogin();
</script>
</body>
</html>
