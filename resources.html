<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Resources — Timeaayi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
  body { background: var(--gray); min-height: 100vh; }

  .page-header-row {
    max-width: 1000px;
    margin: 0 auto;
    padding: 16px 24px 0;
    display: flex;
    justify-content: flex-end;
  }

  .change-link {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--black);
    text-decoration: none;
    border-bottom: 2px solid var(--blue);
  }
  .change-link:hover { color: var(--blue); }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    max-width: 1000px;
    margin: 16px auto 0;
    padding: 0 24px;
  }

  .crumb { background: var(--yellow); border: 2px solid var(--black); padding: 5px 10px; font-weight: 700; }
  .crumb.sem { background: var(--black); color: var(--yellow); }

  main { max-width: 1000px; margin: 0 auto; padding: 24px 24px 80px; }

  h1 { font-size: clamp(26px, 4vw, 36px); margin-bottom: 6px; }
  .subhead { font-size: 15px; margin-bottom: 20px; opacity: 0.8; }

  /* ---------- Syllabus button ---------- */
  .syllabus-row { margin-bottom: 24px; }

  .syllabus-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: var(--black);
    color: var(--yellow);
    border: var(--border);
    padding: 12px 20px;
    box-shadow: var(--shadow-md);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .syllabus-btn:hover { transform: translate(-3px, -3px); box-shadow: 8px 8px 0px var(--black); }
  .syllabus-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--black); }
  .syllabus-btn .icon { font-size: 16px; }

  .placeholder-note {
    display: none;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--white);
    border: 2px dashed var(--black);
    padding: 8px 12px;
    max-width: fit-content;
  }
  .placeholder-note.show { display: block; }

  .tabs { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }

  .tab {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: var(--white);
    border: var(--border);
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-md); }
  .tab .count { background: var(--black); color: var(--white); font-size: 11px; padding: 1px 6px; }

  .tab.active[data-tab="classes"] { background: var(--blue); color: var(--white); }
  .tab.active[data-tab="notes"] { background: var(--yellow); }
  .tab.active[data-tab="papers"] { background: var(--orange); color: var(--white); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---------- Subject list (replaces the old resource-card grid) ---------- */
  .subject-list { display: flex; flex-direction: column; gap: 16px; }

  .subject-card {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow-md);
    padding: 20px;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .subject-card:hover { transform: translate(-3px, -3px); box-shadow: var(--shadow-lg); }

  .card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    display: inline-block;
    padding: 3px 8px;
    border: 2px solid var(--black);
    margin-bottom: 10px;
  }
  .panel[data-panel="classes"] .card-tag { background: var(--blue); color: var(--white); }
  .panel[data-panel="notes"] .card-tag { background: var(--yellow); }
  .panel[data-panel="papers"] .card-tag { background: var(--orange); color: var(--white); }

  .subject-card h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 14px;
  }

  .module-row { display: flex; flex-wrap: wrap; gap: 10px; }

  .module-btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    background: var(--white);
    border: 2px solid var(--black);
    padding: 8px 14px;
    box-shadow: 3px 3px 0px var(--black);
    text-decoration: none;
    color: var(--black);
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
  }
  .module-btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--black); background: var(--gray); }
  .module-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px var(--black); }

  .panel[data-panel="classes"] .module-btn:hover { background: var(--blue); color: var(--white); }
  .panel[data-panel="notes"] .module-btn:hover { background: var(--yellow); }
  .panel[data-panel="papers"] .module-btn:hover { background: var(--orange); color: var(--white); }

  /* Buttons with no URL yet — visibly inactive, no hover lift, no shadow travel */
  .module-btn.module-btn--disabled {
    background: var(--gray);
    color: var(--black);
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: 3px 3px 0px var(--black);
  }
  .module-btn.module-btn--disabled:hover,
  .module-btn.module-btn--disabled:active {
    transform: none;
    box-shadow: 3px 3px 0px var(--black);
    background: var(--gray);
    color: var(--black);
  }

  .empty {
    border: 3px dashed var(--black);
    padding: 40px 24px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    opacity: 0.75;
  }

  .fallback-flag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: var(--orange);
    color: var(--white);
    border: 2px solid var(--black);
    padding: 4px 8px;
    display: inline-block;
    margin-bottom: 16px;
  }

  @media (max-width: 600px) {
    .page-header-row { justify-content: flex-start; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" id="siteNav">
      <a href="index.html" class="site-logo brand">time<span>aayi</span></a>
      <ul class="nav-links">
        <li><a href="select-course.html">Change course</a></li>
      </ul>
      <div class="auth-buttons" id="authButtons">
        <a href="signin.html" class="btn">Sign In</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
    </nav>
  </header>

  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="page-header-row">
    <a href="select-course.html" class="change-link">Change ↺</a>
  </div>

  <main>
    <h1 id="pageTitle">Your resources</h1>
    <p class="subhead" id="pageSub">Everything for this semester, in one place.</p>

    <div id="fallbackFlag"></div>

    <div class="syllabus-row">
      <a href="#" class="syllabus-btn" id="syllabusBtn"><span class="icon">📄</span> View Syllabus</a>
      
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="classes">Classes <span class="count" id="countClasses">0</span></button>
      <button class="tab" data-tab="notes">Notes <span class="count" id="countNotes">0</span></button>
      <button class="tab" data-tab="papers">Question Papers <span class="count" id="countPapers">0</span></button>
    </div>

    <section class="panel active" data-panel="classes">
      <div class="subject-list" id="gridClasses"></div>
    </section>

    <section class="panel" data-panel="notes">
      <div class="subject-list" id="gridNotes"></div>
    </section>

    <section class="panel" data-panel="papers">
      <div class="subject-list" id="gridPapers"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>Timeaayi © 2026</span>
      <span>Built for students, by students</span>
    </div>
  </footer>

<script src="assets/js/app.js"></script>
<script src="data/manifest.js"></script>
<script>
  // ---- Read selection from URL ----
  // select-course.html already sends both the machine key (university/course)
  // and the display label (universityLabel/courseLabel) — we need the keys
  // to look up real syllabus data, and the labels just for the breadcrumb text.
  const params = new URLSearchParams(window.location.search);
  const universityKey   = params.get('university') || '';
  const courseKey       = params.get('course') || '';
  const universityLabel = params.get('universityLabel') || 'Your University';
  const courseLabel     = params.get('courseLabel') || 'Your Course';
  const semester        = parseInt(params.get('semester') || '1', 10);

  document.getElementById('breadcrumb').innerHTML = `
    <span class="crumb">${universityLabel}</span>
    <span class="crumb">${courseLabel}</span>
    <span class="crumb sem">Sem ${semester}</span>
  `;
  document.getElementById('pageSub').textContent =
    `${courseLabel} · Semester ${semester} · ${universityLabel}`;

  // =====================================================================
  // COURSE DATA LOADING
  // resources.html no longer contains any syllabus data itself.
  // COURSE_MANIFEST (from data/manifest.js, loaded just above this script) maps
  // "university:course" -> a data file. We load that one file with a
  // dynamically-injected <script> tag, which populates window.COURSE_DATA.
  //
  // Using a <script> tag (not fetch()) is deliberate: fetch() of a local
  // file is blocked by the browser when the site is opened directly as
  // file:// (no server), which is how this project is still tested
  // locally. <script> tags aren't subject to that restriction, so this
  // works identically both locally and once deployed.
  //
  // To add a new course: create /data/<uni>-<course>.js in the same shape
  // (window.COURSE_DATA = { meta, semesters }), then add one line to
  // data/manifest.js. Nothing here needs to change.
  // =====================================================================
  const manifestKey = `${universityKey}:${courseKey}`;
  const dataFilePath = window.COURSE_MANIFEST ? window.COURSE_MANIFEST[manifestKey] : undefined;

  // Used whenever the manifest has no entry for the chosen university/course
  // (e.g. it hasn't been built yet). Clearly labeled as placeholder so it's
  // obvious in the UI it isn't real.
  function fallbackSubjects(sem) {
    return [
      { code: `SUB${sem}01`, name: 'Subject 1 (placeholder — add real syllabus)' },
      { code: `SUB${sem}02`, name: 'Subject 2 (placeholder — add real syllabus)' },
      { code: `SUB${sem}03`, name: 'Subject 3 (placeholder — add real syllabus)' },
      { code: `SUB${sem}04`, name: 'Subject 4 (placeholder — add real syllabus)' },
    ];
  }

  function showFallbackFlag() {
    document.getElementById('fallbackFlag').innerHTML =
      `<span class="fallback-flag">⚠ Placeholder subjects — real syllabus not added for this university/course yet</span>`;
  }

  // ---- Module / year labels for the 5 buttons per subject ----
  const MODULES = ['Module 1', 'Module 2', 'Module 3', 'Module 4', 'Module 5'];

  // Fallback only — used for placeholder subjects that have no course data
  // (and therefore no meta.paperYears) behind them at all.
  const CURRENT_YEAR = new Date().getFullYear();
  const DEFAULT_YEARS = Array.from({ length: 5 }, (_, i) => CURRENT_YEAR - i);

  // ---- Render a subject list for one tab ----
  // kind: 'classes' | 'notes' | 'papers' — determines button labels and tag color (via CSS)
  // years: the specific year list to use for the 'papers' tab (from
  //   COURSE_DATA.meta.paperYears when real course data is loaded).
  function renderSubjectList(gridId, kind, subjects, years) {
    const grid = document.getElementById(gridId);
    if (!subjects.length) {
      grid.innerHTML = `<div class="empty">Nothing uploaded here yet. Check back soon, or be the first to add one.</div>`;
      return;
    }

    const labels = kind === 'papers' ? years : MODULES;

    grid.innerHTML = subjects.map(sub => {
      const buttons = labels.map(label => {
        const url = sub.links?.[kind]?.[label];
        if (url) {
          // Real file — normal working link, opens in a new tab.
          return `<a href="${url}" target="_blank" rel="noopener" class="module-btn">${label}</a>`;
        }
        // No URL yet — render as inert, visibly disabled, no dead href.
        return `<span class="module-btn module-btn--disabled" title="Not added yet">${label}</span>`;
      }).join('');

      return `
        <div class="subject-card">
          <span class="card-tag">${sub.code}</span>
          <h3>${sub.name}</h3>
          <div class="module-row">${buttons}</div>
        </div>
      `;
    }).join('');
  }

  // ---- Once we have subjects (real or fallback), render the whole page ----
  function renderPage(subjects, syllabusUrl, years) {
    const paperYears = years || DEFAULT_YEARS;
    renderSubjectList('gridClasses', 'classes', subjects, paperYears);
    renderSubjectList('gridNotes', 'notes', subjects, paperYears);
    renderSubjectList('gridPapers', 'papers', subjects, paperYears);

    document.getElementById('countClasses').textContent = subjects.length;
    document.getElementById('countNotes').textContent = subjects.length;
    document.getElementById('countPapers').textContent = subjects.length;

    // Buttons with a real link (rendered as <a>) navigate normally — no JS
    // needed. Buttons with no link yet are rendered as inert <span>s (see
    // renderSubjectList), so there's nothing to wire up for those either.

    document.getElementById('syllabusBtn').addEventListener('click', (e) => {
      if (syllabusUrl) {
        window.open(syllabusUrl, '_blank');
      } else {
        e.preventDefault();
        const note = document.getElementById('syllabusNote');
        if (note) note.classList.toggle('show');
      }
    });
  }

  if (dataFilePath) {
    // Real course data exists — load it, then render from it.
    const script = document.createElement('script');
    script.src = dataFilePath;
    script.onload = () => {
      const subjects = (window.COURSE_DATA && window.COURSE_DATA.semesters[semester]) || [];
      if (!subjects.length) showFallbackFlag();
      renderPage(
        subjects.length ? subjects : fallbackSubjects(semester),
        window.COURSE_DATA?.meta?.syllabusUrl,
        window.COURSE_DATA?.meta?.paperYears
      );
    };
    script.onerror = () => {
      // Data file listed in the manifest but failed to load (e.g. typo'd path).
      showFallbackFlag();
      renderPage(fallbackSubjects(semester), null);
    };
    document.head.appendChild(script);
  } else {
    // No manifest entry for this university/course yet.
    showFallbackFlag();
    renderPage(fallbackSubjects(semester), null);
  }

  // ---- Tabs ----
  const tabs = document.querySelectorAll('.tab');
  const panels = document.querySelectorAll('.panel');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.querySelector(`.panel[data-panel="${tab.dataset.tab}"]`).classList.add('active');
    });
  });

  // ---- Shared header behavior ----
  const menuToggle = document.getElementById('menuToggle');
  const nav = document.getElementById('siteNav');
  menuToggle.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    menuToggle.setAttribute('aria-expanded', isOpen);
    menuToggle.textContent = isOpen ? '✕' : '☰';
  });
  TimeaayiAuth.renderAuthButtons('authButtons');

  // Note: resources are viewable without an account in this version.
  // To require sign-in before browsing, uncomment the line below:
  // TimeaayiAuth.requireLogin();
</script>
</body>
</html>
